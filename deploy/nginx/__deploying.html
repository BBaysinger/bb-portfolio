<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deploy In Progress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #0d0f12;
        --page-bg-alt: #161a20;
        --panel-bg: rgba(18, 21, 27, 0.9);
        --panel-border: rgba(255, 255, 255, 0.12);
        --text-main: #f2f4f7;
        --text-muted: rgba(242, 244, 247, 0.72);
        --accent: #f49d37;
        --accent-soft: rgba(244, 157, 55, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Roboto",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(
            circle at top,
            rgba(244, 157, 55, 0.16),
            transparent 38%
          ),
          linear-gradient(180deg, var(--page-bg-alt), var(--page-bg));
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .card {
        width: min(42rem, 100%);
        padding: clamp(2rem, 5vw, 3rem);
        border: 1px solid var(--panel-border);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 55%),
          var(--panel-bg);
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 1rem;
        padding: 0.35rem 0.65rem;
        font:
          700 0.75rem/1.2 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-soft);
      }

      h1 {
        font-weight: 500;
        margin: 0 0 0.85rem;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.7;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <span class="eyebrow">Temporary</span>
        <h1>Deploy in progress</h1>
        <p>
          The site is switching to a fresh release. Please retry in a few
          seconds.
        </p>
      </section>
    </main>
  </body>
</html>
