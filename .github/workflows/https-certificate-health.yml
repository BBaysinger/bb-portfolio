name: HTTPS Certificate Health

on:
  schedule:
    - cron: "17 9,21 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-https:
    name: Check HTTPS certificate health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials for alert email
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare SSH key
        id: ssh
        env:
          SSH_KEY_PEM: ${{ secrets.EC2_SSH_KEY_PEM }}
          SSH_KEY_ALT: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          CONTENT="${SSH_KEY_PEM:-}"
          if [ -z "$CONTENT" ] && [ -n "${SSH_KEY_ALT:-}" ]; then
            CONTENT="$SSH_KEY_ALT"
          fi
          if [ -z "$CONTENT" ]; then
            echo "Missing SSH key secret: provide EC2_SSH_KEY_PEM or EC2_SSH_KEY" >&2
            exit 1
          fi
          umask 177
          printf "%s" "$CONTENT" > key.pem
          echo "key=key.pem" >> "$GITHUB_OUTPUT"

      - name: Run HTTPS health check
        id: https_check
        continue-on-error: true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          PUBLIC_SERVER_URL: ${{ secrets.PUBLIC_SERVER_URL }}
          PAYLOAD_PUBLIC_SERVER_URL: ${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          HTTPS_ALERT_DAYS: "21"
        run: bash deploy/scripts/actions/check-https-health.sh "${{ steps.ssh.outputs.key }}"

      - name: Open or update HTTPS alert issue
        if: ${{ steps.https_check.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'HTTPS certificate health alert';
            const body = [
              'The scheduled HTTPS certificate health check failed.',
              '',
              `Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              '',
              'This means at least one of these checks failed:',
              '- certificate expires within 21 days',
              '- certbot-renew.timer is missing, disabled, or inactive',
              '- local origin HTTPS probe failed',
              '- certbot renew --dry-run failed',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Send HTTPS alert email
        if: ${{ steps.https_check.outcome == 'failure' }}
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          SES_TO_EMAIL: ${{ secrets.SES_TO_EMAIL }}
          EMAIL_SUBJECT: "[bb-portfolio] HTTPS certificate health alert"
          EMAIL_BODY: |
            The scheduled HTTPS certificate health check failed.

            Repository: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The workflow checks:
            - certificate expires within 21 days
            - certbot-renew.timer is enabled and active
            - origin HTTPS responds for apex and www
            - certbot renew --dry-run succeeds

            A GitHub issue titled "HTTPS certificate health alert" was opened or updated.
        run: bash deploy/scripts/actions/send-alert-email.sh "$EMAIL_SUBJECT" "$EMAIL_BODY"

      - name: Close HTTPS alert issue on recovery
        if: ${{ steps.https_check.outcome == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'HTTPS certificate health alert';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: `HTTPS certificate health recovered in workflow run ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: 'closed',
            });

      - name: Send HTTPS recovery email
        if: ${{ steps.https_check.outcome == 'success' }}
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          SES_TO_EMAIL: ${{ secrets.SES_TO_EMAIL }}
          EMAIL_SUBJECT: "[bb-portfolio] HTTPS certificate health recovered"
          EMAIL_BODY: |
            The scheduled HTTPS certificate health check has recovered.

            Repository: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The GitHub alert issue was commented on and closed if it was open.
        run: bash deploy/scripts/actions/send-alert-email.sh "$EMAIL_SUBJECT" "$EMAIL_BODY"

      - name: Fail workflow when HTTPS check fails
        if: ${{ steps.https_check.outcome == 'failure' }}
        run: |
          echo 'HTTPS certificate health check failed.' >&2
          exit 1
